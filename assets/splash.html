<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>LocalGPT</title>

<style>

body{

background:#101317;

margin:0;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

font-family:Segoe UI;

color:white;

overflow:hidden;

}

.container{

text-align:center;

}

img{

width:170px;

margin-bottom:30px;

}

h1{

font-size:48px;

margin:0;

}

p{

color:#74b9ff;

font-size:22px;

margin-top:15px;

}

.loader{

width:320px;

height:8px;

background:#222;

margin:auto;

margin-top:40px;

border-radius:20px;

overflow:hidden;

}

.bar{

height:100%;

width:0%;

background:#2aa9ff;

animation:load 2s linear forwards;

}

@keyframes load{

from{

width:0%;

}

to{

width:100%;

}

}

</style>

</head>

<body>

<div class="container">

<img src="logo.png">

<h1>LocalGPT</h1>

<p>Loading AI Engine...</p>

<div class="loader">

<div class="bar"></div>

</div>

</div>

</body>

</html>
